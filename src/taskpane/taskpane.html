<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word TTS Reader</title>
  </head>
  <body>
    <div class="container">
      <h1>Word TTS Reader</h1>

      <div class="actions">
        <button id="startBtn">Read selection</button>
        <button id="pauseBtn" disabled>Pause</button>
        <button id="resumeBtn" disabled>Resume</button>
        <button id="stopBtn" disabled>Stop</button>
      </div>

      <section class="panel">
        <h2>Settings</h2>
        <label>
          TTS API URL
          <input id="apiUrl" type="url" placeholder="https://example.com/api/tts" />
        </label>
        <label>
          API key (optional)
          <input id="apiKey" type="password" placeholder="Bearer token value" />
        </label>
        <label>
          Voice
          <input id="voice" type="text" placeholder="default" />
        </label>
        <label>
          Speed (0.5-2.0)
          <input id="rate" type="number" min="0.5" max="2" step="0.1" />
        </label>
        <label>
          Pause between chunks (ms)
          <input id="pauseMs" type="number" min="0" max="2000" step="10" />
        </label>
        <label>
          Volume (0-1)
          <input id="volume" type="number" min="0" max="1" step="0.05" />
        </label>
        <label>
          Max chunk length
          <input id="maxChunkLength" type="number" min="80" max="1200" step="10" />
        </label>
        <label>
          Audio format
          <input id="audioFormat" type="text" placeholder="mp3" />
        </label>
      </section>

      <p id="status" class="status">Ready.</p>
      <p id="progress" class="progress"></p>
    </div>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </body>
</html>
