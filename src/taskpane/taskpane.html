<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Озвучивание текста</title>
  </head>
  <body>
    <div class="container">
      <h1>Озвучивание текста</h1>

      <div class="actions">
        <button id="startBtn" class="btn btnPrimary">Озвучить выделение</button>
        <button id="pauseBtn" class="btn" disabled>Пауза</button>
        <button id="resumeBtn" class="btn" disabled>Продолжить</button>
        <button id="stopBtn" class="btn btnDanger" disabled>Стоп</button>
      </div>

      <details class="panel" id="settingsPanel">
        <summary class="panelSummary">Настройки</summary>
        <label>
          URL TTS API (база `/v1/`)
          <input id="apiUrl" type="url" placeholder="http://localhost:8000/v1/" />
        </label>
        <label>
          API ключ (необязательно)
          <input id="apiKey" type="password" placeholder="Bearer token" />
        </label>
        <label>
          Голос
          <select id="voice"></select>
        </label>
        <label>
          Скорость (0.5–2.0)
          <input id="rate" type="number" min="0.5" max="2" step="0.1" />
        </label>
        <label>
          Пауза между фрагментами (мс)
          <input id="pauseMs" type="number" min="0" max="2000" step="10" />
        </label>
        <label>
          Громкость (0–1)
          <input id="volume" type="number" min="0" max="1" step="0.05" />
        </label>
        <label>
          Максимальная длина фрагмента
          <input id="maxChunkLength" type="number" min="80" max="1200" step="10" />
        </label>
        <label>
          Формат аудио
          <input id="audioFormat" type="text" placeholder="mp3 / wav / ogg" />
        </label>
      </details>

      <p id="status" class="status">Готово.</p>
      <p id="progress" class="progress"></p>
    </div>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </body>
</html>
