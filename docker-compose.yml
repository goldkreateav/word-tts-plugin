services:
  tts-api:
    build:
      context: ../TTS API
      dockerfile: Dockerfile
    ports:
      - "5529:5529"
    environment:
      # Optional: set API key by creating .env near this compose file and uncommenting:
      # TTS_API_KEY: ${TTS_API_KEY}
      # (API reads `tts_api_key` from `.env` by default; env vars also work via pydantic-settings.)
      - PYTHONUNBUFFERED=1

  word-tts-plugin:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Match how you open the app in the browser (https://localhost:3000/...).
      - WORD_TTS_PROTOCOL=${WORD_TTS_PROTOCOL:-https}
      - OFFICE_ADDIN_DEV_CERTS_DIR=/certs
      - TTS_API_BASE_URL=${TTS_API_BASE_URL:-https://localhost:5529/v1/}
    volumes:
      # Same certs as `npm run start` on the host (run `npm run certs:install` once).
      - ${HOME}/.office-addin-dev-certs:/certs:ro
    depends_on:
      - tts-api
