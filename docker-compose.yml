services:
  tts-api:
    build:
      context: ../TTS API
      dockerfile: Dockerfile
    ports:
      - "5529:5529"
    environment:
      # Optional: set API key by creating .env near this compose file and uncommenting:
      # TTS_API_KEY: ${TTS_API_KEY}
      # (API reads `tts_api_key` from `.env` by default; env vars also work via pydantic-settings.)
      - PYTHONUNBUFFERED=1

  word-tts-plugin:
    build:
      context: .
      dockerfile: Dockerfile
    # Same networking as `npm run start` on the host (Linux). Port 3000 is exposed
    # on the server directly, not only via docker bridge / 172.x.
    network_mode: host
    environment:
      - WORD_TTS_PROTOCOL=${WORD_TTS_PROTOCOL:-https}
      - OFFICE_ADDIN_DEV_CERTS_DIR=/certs
      - TTS_API_BASE_URL=${TTS_API_BASE_URL:-https://localhost:5529/v1/}
    volumes:
      # Set in .env if you use sudo: OFFICE_ADDIN_DEV_CERTS_HOST_DIR=/home/you/.office-addin-dev-certs
      - ${OFFICE_ADDIN_DEV_CERTS_HOST_DIR:-${HOME}/.office-addin-dev-certs}:/certs:ro
    depends_on:
      - tts-api
